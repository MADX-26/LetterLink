{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lobby - Grid Word</title>
    <link rel="stylesheet" href="{% static 'game/style.css' %}">
    <style>
        .room-code-badge {
            font-size: 2rem;
            font-weight: 800;
            color: #3b82f6;
            background: #eff6ff;
            padding: 1rem 2rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            letter-spacing: 0.25rem;
            display: inline-block;
        }
        .status-text {
            color: #6b7280;
            font-size: 1.125rem;
            margin-top: 1rem;
        }
        .modern-loader {
            margin: 2rem auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modern-card" style="text-align: center;">
        <div class="modern-header">
            <h1 class="modern-title">Game Lobby</h1>
            <p class="modern-subtitle">Invite a friend to join the game</p>
        </div>

        <div class="room-code-badge">
            {{ room_name }}
        </div>

        <div id="status" class="status-text">
            Waiting for second player...
        </div>

        <div class="modern-loader"></div>

        <div class="divider"></div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #6b7280;">Logged in as <b>{{ request.user.username }}</b></span>
            <a href="/logout/" class="footer-link" style="color: #ef4444;">Logout</a>
        </div>
    </div>

    <script>

        const socket = new WebSocket(
            `ws://${window.location.host}/ws/game/{{ room_name }}/`
        );

        socket.onopen = () => {
            console.log("Lobby connected");
        };

        socket.onmessage = (event) => {

            const data = JSON.parse(event.data);
            console.log(data);

            if (data.type === "player_assignment") {

                document.getElementById("status").innerText =
                    `You are Player ${data.player} — waiting for opponent...`;
            }

            if (data.type === "start_game") {

                document.getElementById("status").innerText =
                    "Game starting...";

                setTimeout(() => {
                    window.location.replace(`/play/{{ room_name }}/`);
                }, 800);
            }

            if (data.type === "player_left") {
                document.getElementById("status").innerText = "Opponent left the lobby.";
                document.getElementById("status").style.color = "#ef4444";
                
                const loader = document.querySelector(".modern-loader");
                if (loader) loader.style.display = "none";

                if (!document.getElementById("return-btn")) {
                    const btn = document.createElement("button");
                    btn.id = "return-btn";
                    btn.innerText = "Return to Home";
                    btn.className = "modern-btn";
                    btn.style.marginTop = "1.5rem";
                    btn.onclick = () => window.location.href = "/";
                    document.getElementById("status").after(btn);
                }
            }
        };

    </script>

</body>

</html>
