<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lobby</title>

    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            width: 400px;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logout-btn {
            text-decoration: none;
            background: #ff4d4d;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff1a1a;
        }

        h2 {
            margin: 10px 0;
        }

        .room-code {
            font-size: 22px;
            margin: 15px 0;
            background: #3a3a55;
            padding: 10px;
            border-radius: 8px;
            letter-spacing: 2px;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
            color: #00c896;
        }

        .loader {
            margin-top: 20px;
            border: 4px solid #444;
            border-top: 4px solid #00c896;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="top-bar">
            <span>👋 {{ request.user.username }}</span>
            <a href="/logout/" class="logout-btn">Logout</a>
        </div>

        <h2>Game Lobby</h2>

        <div class="room-code">
            {{ room_name }}
        </div>

        <div id="status">
            Waiting for second player...
        </div>

        <div class="loader"></div>

    </div>

    <script>

        const socket = new WebSocket(
            `ws://${window.location.host}/ws/game/{{ room_name }}/`
        );

        socket.onopen = () => {
            console.log("Lobby connected");
        };

        socket.onmessage = (event) => {

            const data = JSON.parse(event.data);
            console.log(data);

            if (data.type === "player_assignment") {

                document.getElementById("status").innerText =
                    `You are Player ${data.player} — waiting for opponent...`;
            }

            if (data.type === "start_game") {

                document.getElementById("status").innerText =
                    "Game starting...";

                setTimeout(() => {
                    window.location.replace(`/play/{{ room_name }}/`);
                }, 800);
            }
        };

    </script>

</body>

</html>
