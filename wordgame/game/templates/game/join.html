{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Room - Grid Word</title>
    <link rel="stylesheet" href="{% static 'game/style.css' %}">
    <style>
        input {
            width: 100%;
            padding: 0.875rem;
            margin: 1rem 0;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            outline: none;
            font-size: 1.25rem;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 0.25rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="modern-card" style="max-width: 24rem; text-align: center;">
        <div class="modern-header">
            <h1 class="modern-title" style="font-size: 1.875rem;">Join Game</h1>
            <p class="modern-subtitle">Enter the room code shared with you</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <input 
                type="text" 
                name="room_code" 
                placeholder="CODE"
                maxlength="8"
                required
            >
            <button type="submit" class="modern-btn">Join Room</button>
        </form>

        <div class="divider"></div>

        <div style="text-align: center;">
            <a href="/" class="footer-link">⬅ Back to Home</a>
        </div>
    </div>
</body>
</html>
