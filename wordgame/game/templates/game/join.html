<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Join Room</title>

    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00c896;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00a67c;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #00c896;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>🔑 Join Game Room</h2>

        <form method="POST">
            {% csrf_token %}

            <input 
                type="text" 
                name="room_code" 
                placeholder="Enter Room Code"
                required
            >

            <button type="submit">Join Room</button>
        </form>

        <a href="/">⬅ Back to Home</a>

    </div>

</body>

</html>
