{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leader Board - Grid Word</title>
    <link rel="stylesheet" href="{% static 'game/style.css' %}">
    <style>
        body {
            display: block;
            height: auto;
            padding: 2rem;
        }
        .modern-card {
            max-width: 40rem;
            margin: 0 auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid #f3f3f3;
            color: #6b7280;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid #f3f3f3;
            color: #1f2937;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .rank-badge {
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f3f4f6;
            font-weight: 700;
            color: #4b5563;
        }
        .rank-1 { background: #fef3c7; color: #92400e; }
        .rank-2 { background: #f3f4f6; color: #4b5563; }
        .rank-3 { background: #ffedd5; color: #9a3412; }
        
        .wins-badge {
            color: #3b82f6;
            font-weight: 700;
            background: #eff6ff;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            display: inline-block;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="modern-card">
        <div class="modern-header" style="display: flex; justify-content: space-between; align-items: center; text-align: left;">
            <div>
                <h1 class="modern-title" style="font-size: 1.875rem;">🏆 Leader Board</h1>
                <p class="modern-subtitle">Top players by total wins</p>
            </div>
            <a href="/" class="modern-btn" style="width: auto; padding: 0.5rem 1.5rem;">⬅ Back</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 4rem;">Rank</th>
                    <th>Player</th>
                    <th style="text-align: right;">Total Wins</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in leaderboard %}
                <tr>
                    <td>
                        <div class="rank-badge {% if forloop.counter == 1 %}rank-1{% elif forloop.counter == 2 %}rank-2{% elif forloop.counter == 3 %}rank-3{% endif %}">
                            {{ forloop.counter }}
                        </div>
                    </td>
                    <td><b>{{ entry.username }}</b></td>
                    <td style="text-align: right;">
                        <span class="wins-badge">{{ entry.wins }} Wins</span>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" style="text-align: center; padding: 3rem; color: #6b7280;">No player data available.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
