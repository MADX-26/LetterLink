{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Grid Word</title>
    <link rel="stylesheet" href="{% static 'game/style.css' %}">
    <style>
        input {
            width: 100%;
            padding: 0.875rem;
            margin: 0.75rem 0;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            outline: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="modern-card" style="max-width: 24rem;">
        <div class="modern-header">
            <h1 class="modern-title" style="font-size: 1.875rem;">Create Account</h1>
            <p class="modern-subtitle">Join the Grid Word community</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="modern-btn" style="margin-top: 1rem;">Register</button>
        </form>

        <div class="divider"></div>
        
        <div style="text-align: center;">
            <a href="/login/" class="footer-link">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
